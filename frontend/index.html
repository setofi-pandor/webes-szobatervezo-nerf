<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Webes szobatervező demó</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #menu {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 10;
        }

        #status {
            white-space: pre-line;
            font-size: 14px;
        }
    </style>

    <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>

    <div id="menu">
        <h2>Szobatervező demó</h2>

        <input type="file" id="videoInput">
        <button id="uploadButton">Feltöltés</button>
        <button onclick="asztalHozzaadas()">Asztal hozzáadása</button>
        <button onclick="szekHozzaadas()">Szék hozzáadása</button>

        <p id="status"></p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const jelenet = new THREE.Scene();
        jelenet.background = new THREE.Color(0xeeeeee);

        const kamera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        kamera.position.set(4, 4, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(kamera, renderer.domElement);

        const iranyFeny = new THREE.DirectionalLight(0xffffff, 1);
        iranyFeny.position.set(5, 10, 5);
        jelenet.add(iranyFeny);

        const kornyezetiFeny = new THREE.AmbientLight(0xffffff, 0.5);
        jelenet.add(kornyezetiFeny);

        const padloGeometry = new THREE.PlaneGeometry(10, 10);
        const padloMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc });
        const padlo = new THREE.Mesh(padloGeometry, padloMaterial);

        padlo.rotation.x = -Math.PI / 2;
        jelenet.add(padlo);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(jelenet, kamera);
        }

        animate();

        document.getElementById('uploadButton').addEventListener('click', async function () {
            const input = document.getElementById('videoInput');
            const file = input.files[0];

            if (!file) {
                alert('Válassz ki egy videót!');
                return;
            }

            const formData = new FormData();
            formData.append('video', file);

            const response = await fetch('http://localhost:3000/upload', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            document.getElementById('status').innerText =
                data.message +
                '\nMunka azonosító: ' + data.munkaAzonosito +
                '\nKépek mappája: ' + data.kepekMappa +
                '\n3D modell útvonala: ' + data.modelUrl;
        });

        window.asztalHozzaadas = function () {
            const asztalMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });

            const asztalLapGeometry = new THREE.BoxGeometry(2, 0.1, 1);
            const asztalLap = new THREE.Mesh(asztalLapGeometry, asztalMaterial);
            asztalLap.position.set(0, 1, 0);
            jelenet.add(asztalLap);

            const labGeometry = new THREE.BoxGeometry(0.1, 1, 0.1);

            const labPoziciok = [
                [-0.9, 0.5, -0.4],
                [0.9, 0.5, -0.4],
                [-0.9, 0.5, 0.4],
                [0.9, 0.5, 0.4]
            ];

            labPoziciok.forEach(pozicio => {
                const asztalLab = new THREE.Mesh(labGeometry, asztalMaterial);
                asztalLab.position.set(pozicio[0], pozicio[1], pozicio[2]);
                jelenet.add(asztalLab);
            });
        };

        window.szekHozzaadas = function () {
            const szekMaterial = new THREE.MeshStandardMaterial({ color: 0x4444aa });

            const ulolapGeometry = new THREE.BoxGeometry(1, 0.1, 1);
            const ulolap = new THREE.Mesh(ulolapGeometry, szekMaterial);
            ulolap.position.set(2, 0.6, 0);
            jelenet.add(ulolap);

            const hattamlaGeometry = new THREE.BoxGeometry(1, 1, 0.1);
            const hattamla = new THREE.Mesh(hattamlaGeometry, szekMaterial);
            hattamla.position.set(2, 1.1, 0.45);
            jelenet.add(hattamla);

            const labGeometry = new THREE.BoxGeometry(0.1, 0.6, 0.1);

            const labPoziciok = [
                [1.6, 0.3, -0.4],
                [2.4, 0.3, -0.4],
                [1.6, 0.3, 0.4],
                [2.4, 0.3, 0.4]
            ];

            labPoziciok.forEach(pozicio => {
                const szekLab = new THREE.Mesh(labGeometry, szekMaterial);
                szekLab.position.set(pozicio[0], pozicio[1], pozicio[2]);
                jelenet.add(szekLab);
            });
        };
    </script>

</body>
</html>
